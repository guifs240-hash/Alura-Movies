<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Selecione um Perfil</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
            <div class="theme-switch-container" aria-label="Alternar modo claro/escuro">
                <label class="switch">
                    <input type="checkbox" id="theme-toggle" aria-label="Ativar modo claro">
                    <span class="slider round"></span>
                </label>
                <span id="theme-text">Modo Escuro</span>
            </div>
        </header>

        <section class="profiles" aria-label="Seleção de perfis">
            <article class="profile">
                <figure>
                    <div class="img-wrapper">
                        <img src="/assets/Profile_1.png" alt="Guilherme">
                    </div>
                    <figcaption>Guilherme</figcaption>
                </figure>
            </article>

            <article class="profile">
                <figure>
                    <div class="img-wrapper">
                        <img src="/assets/Profile_2.jpeg" 
                             alt="Clara">
                    </div>
                    <figcaption>Clara</figcaption>
                </figure>
            </article>
            <article class="profile">
                <figure>
                    <div class="img-wrapper">
                        <img src="/assets/Profile_3.png" alt="Perfil 3">
                    </div>
                    <figcaption>Perfil 3</figcaption>
                </figure>
            </article>

            <article class="profile">
                <figure>
                    <div class="img-wrapper">
                        <img src="/assets/Profile_4.png" alt="Perfil 4">
                    </div>
                    <figcaption>Perfil 4</figcaption>
                </figure>
            </article>        </section>
   








</main>
    <script src="index.js"></script>
</body>
</html>
